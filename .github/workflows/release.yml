name: Release TableSmith

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$') {
            throw "タグは v1.2.3 のようなSemVer形式で指定してください。"
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore WPF_TableSmith.sln

      - name: Publish win-x64 self-contained
        shell: pwsh
        run: |
          dotnet publish TableSmith/TableSmith.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o publish `
            /p:Version=${{ steps.version.outputs.version }} `
            /p:DebugType=None `
            /p:DebugSymbols=false

      - name: Install Velopack CLI
        run: dotnet tool install --global vpk --version 1.2.0

      - name: Download previous Velopack release
        continue-on-error: true
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GITHUB_TOKEN `
            --outputDir Releases

      - name: Pack Velopack release
        shell: pwsh
        run: |
          vpk pack `
            --packId "BambooSystem.TableSmith" `
            --packTitle "TableSmith" `
            --packVersion "${{ steps.version.outputs.version }}" `
            --packDir publish `
            --mainExe "TableSmith.exe" `
            --runtime win-x64 `
            --icon "TableSmith/Resources/Images/TableSmith.ico" `
            --outputDir Releases

      - name: Upload GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          vpk upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token $env:GITHUB_TOKEN `
            --publish `
            --releaseName "TableSmith ${{ steps.version.outputs.version }}" `
            --tag "v${{ steps.version.outputs.version }}" `
            --outputDir Releases
